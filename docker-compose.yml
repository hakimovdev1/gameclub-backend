services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-gameclub}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4040
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_DATABASE: ${DB_DATABASE:-gameclub}
      DB_SYNCHRONIZE: 'false'
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set a strong access secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set a strong refresh secret}
      COOKIE_SECURE: 'true'
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # Optional: seed the first OWNER account on boot (idempotent).
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL:-}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-}
    ports:
      - '${PORT:-4040}:4040'

volumes:
  pgdata:
